<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黑账小册</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; }
    #app { max-width: 640px; margin: 0 auto; padding: 16px; min-height: 100vh; }
    h1 { text-align: center; margin: 24px 0; font-size: 1.5em; color: #e94560; }
    #phase-title { font-size: 1.2em; margin: 12px 0; color: #f5a623; }
    #phase-content { min-height: 200px; padding: 12px; background: #16213e; border-radius: 8px; margin: 8px 0; }
    #status-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; font-size: 0.9em; }
    .stat { padding: 4px 8px; background: #0f3460; border-radius: 4px; }
    #action-area { margin: 12px 0; }
    button { padding: 8px 16px; margin: 4px; border: none; border-radius: 4px; background: #e94560; color: #fff; cursor: pointer; font-size: 1em; }
    button:hover { background: #c73550; }
    #log { margin-top: 12px; font-size: 0.85em; color: #888; max-height: 120px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="app">
    <h1>黑账小册</h1>
    <div id="status-bar"></div>
    <div id="phase-title"></div>
    <div id="phase-content"></div>
    <div id="action-area"></div>
    <div id="log"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
